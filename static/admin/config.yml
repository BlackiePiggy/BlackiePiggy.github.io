# 后端配置：使用 Git Gateway 代理以避免管理员直接访问 Git 仓库
backend:
  name: git-gateway
  branch: main # 确保与你 GitHub 的主分支名称一致

# 媒体配置：Hugo 静态资源存放于 static，但发布后路径不含 static
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

# 内容集合：定义你的文章结构
collections:
  - name: "publication"
    label: "Publications"
    folder: "content/publication" # 根目录
    extension: "md"
    format: "frontmatter"
    create: true
    # 关键设置：开启嵌套文件夹识别
    nested:
      show_links: true
    # 关键设置：指定文件名为 index
    path: "{{slug}}/index" 
    media_folder: ""
    public_folder: ""
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      # 如果你的图片叫 featured.jpg，可以添加下面这行
      - { label: "Featured Image", name: "image", widget: "image", default: "featured.jpg", required: false }
      - { label: "Body", name: "body", widget: "markdown" }