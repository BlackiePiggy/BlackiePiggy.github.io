# 后端配置：使用 Git Gateway 代理以避免管理员直接访问 Git 仓库
backend:
  name: git-gateway
  branch: main # 确保与你 GitHub 的主分支名称一致

# 媒体配置：Hugo 静态资源存放于 static，但发布后路径不含 static
media_folder: "static/images/uploads"
public_folder: "/images/uploads"

# 内容集合：定义你的文章结构
collections:
  - name: "publication"
    label: "Publications"
    folder: "content/publication"
    extension: "md"
    format: "frontmatter"
    create: true
    # 修复错误：添加 depth 属性
    nested:
      depth: 10 # 允许最多嵌套 10 层文件夹，足够覆盖你的 GEOG 结构
      show_links: true
    # 针对 Hugo Leaf Bundle 的特殊设置
    path: "{{slug}}/index" 
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Authors", name: "authors", widget: "list", summary: "{{fields.author}}" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Publication Date (Schedule)", name: "publishDate", widget: "datetime" }
      
      - { label: "Publication Type", name: "publication_types", widget: "list" }
      - { label: "Publication Name", name: "publication", widget: "string" }
      - { label: "Publication Abbreviation", name: "publication_short", widget: "string" }
      
      - { label: "Abstract", name: "abstract", widget: "text" }
      - { label: "Summary", name: "summary", widget: "text" }
      
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      
      - label: "Links"
        name: "links"
        widget: "list"
        fields:
          - { label: "Type", name: "type", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }

      - label: "Image"
        name: "image"
        widget: "object"
        fields:
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Focal Point", name: "focal_point", widget: "string", default: "", required: false }
          - { label: "Preview Only", name: "preview_only", widget: "boolean", default: false }

      - { label: "Projects", name: "projects", widget: "list", required: false }
      - { label: "Slides", name: "slides", widget: "string", required: false, default: "" }
      
      - { label: "Body", name: "body", widget: "markdown" }