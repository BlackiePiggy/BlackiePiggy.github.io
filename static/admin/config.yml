backend:
  name: git-gateway
  branch: main # 请确认你的分支名

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

collections:
  # 1. 出版物 (Publications) - 嵌套结构
  - name: "publication"
    label: "Publications"
    folder: "content/publication"
    extension: "md"
    format: "frontmatter"
    create: true
    nested:
      depth: 2
    path: "{{slug}}/index"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Authors", name: "authors", widget: "list" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Publication Type", name: "publication_types", widget: "list" }
      - { label: "Publication Name", name: "publication", widget: "string" }
      - { label: "Abstract", name: "abstract", widget: "text" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # 2. 博客文章 (Posts)
  - name: "post"
    label: "Posts"
    folder: "content/post"
    extension: "md"
    format: "frontmatter"
    create: true
    nested:
      depth: 2
    path: "{{slug}}/index"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text", required: false }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Body", name: "body", widget: "markdown" }

  # 3. 项目 (Projects)
  - name: "project"
    label: "Projects"
    folder: "content/project"
    extension: "md"
    format: "frontmatter"
    create: true
    nested:
      depth: 2
    path: "{{slug}}/index"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Tags", name: "tags", widget: "list" }
      - { label: "Body", name: "body", widget: "markdown" }

  # 4. 教学 (Teaching)
  - name: "teaching"
    label: "Teaching"
    folder: "content/teaching"
    extension: "md"
    format: "frontmatter"
    create: true
    nested:
      depth: 2
    path: "{{slug}}/index"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }

  # 5. 活动 (Events)
  - name: "event"
    label: "Events"
    folder: "content/event"
    extension: "md"
    format: "frontmatter"
    create: true
    nested:
      depth: 2
    path: "{{slug}}/index"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  # 6. 单页面管理 (如 Experience, Projects.md)
  - name: "pages"
    label: "Pages"
    files:
      - label: "Experience"
        name: "experience"
        file: "content/experience.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }
      - label: "Projects Page"
        name: "projects_page"
        file: "content/projects.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Body", name: "body", widget: "markdown" }