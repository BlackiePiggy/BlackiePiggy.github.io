<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Template CMS | Media Upload</title>
  <link rel="icon" type="image/svg+xml" href="/publisher/favicon.svg" />
  <script src="/publisher/publisher-media-tools.js"></script>
  <style>
    :root{--bg:#eef2f7;--panel:#fff;--line:#d7dee7;--text:#15202b;--muted:#637282;--brand:#0f766e;--brand2:#1e9b86;--danger:#b91c1c}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg)}
    .layout{display:grid;grid-template-columns:250px minmax(0,1fr);min-height:100vh}
    .side{position:sticky;top:0;height:100vh;overflow-y:auto;background:linear-gradient(160deg,#0d3e39,#0b2e32);color:#dff7f4;padding:20px}
    .brand{font-size:20px;font-weight:700;margin-bottom:20px}
    .nav a{display:block;color:#dff7f4;text-decoration:none;padding:10px 12px;border-radius:10px;margin-bottom:6px}
    .nav a.active,.nav a:hover{background:rgba(255,255,255,.14)}
    .main{min-width:0;padding:18px}
    .top{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
    .top h1{margin:0 0 6px}
    .muted{color:var(--muted);font-size:13px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-size:14px}
    input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand2)}
    button{border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;background:#fff;color:var(--text);cursor:pointer}
    .btn{border:none;background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .progress-list{max-height:240px;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:8px;background:#fff}
    #pasteText,#resultText{min-height:280px;resize:vertical;font-family:Consolas,"Courier New",monospace;line-height:1.5}
    .progress-item{border-bottom:1px dashed var(--line);padding:6px 0;font-size:13px}
    .progress-item:last-child{border-bottom:0}
    .ok{color:#065f46}.fail{color:#b91c1c}
    .preview-box{min-height:220px;border:1px solid var(--line);border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;padding:8px;overflow:auto}
    .preview-meta{font-size:12px;color:var(--muted);margin-top:6px}
    .toast-stack{position:fixed;right:18px;top:18px;display:flex;flex-direction:column;gap:10px;z-index:9999;pointer-events:none}
    .toast{min-width:220px;max-width:360px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);box-shadow:0 12px 30px rgba(21,32,43,.12);opacity:0;transform:translateY(8px);animation:toast-in .18s ease forwards}
    .toast.ok{border-color:#b7e4d7;background:#effaf5;color:#065f46}.toast.err{border-color:#efb6b6;background:#fff5f5;color:#b91c1c}
    .toast.fade-out{animation:toast-out .22s ease forwards}
    @keyframes toast-in{to{opacity:1;transform:translateY(0)}}
    @keyframes toast-out{to{opacity:0;transform:translateY(8px)}}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.side{position:relative;height:auto;padding:14px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="side">
      <div class="brand">Publisher CMS</div>
      <nav class="nav">
        <a href="/publisher/">总览</a>
        <a href="/publisher/profile-manage.html">主页资料</a>
        <a href="/publisher/home-modules.html">首页模块</a>
        <a href="/publisher/create.html">新建发布</a>
        <a href="/publisher/manage.html">内容管理</a>
        <a href="/publisher/media-upload.html" class="active">Media Upload</a>
        <a href="/publisher/oss-config.html">OSS 配置</a>
        <a href="/publisher/template-manage.html">模板管理</a>
      </nav>
    </aside>

    <main class="main">
      <section class="top">
        <h1>Media 一键上传与链接替换</h1>
        <div class="muted">将富文本粘贴进输入框，扫描 media 后一键上传到 OSS 并替换正文中的链接。</div>
      </section>

      <section class="card">
        <div class="grid">
          <div>
            <label>OSS 配置档</label>
            <div class="row">
              <select id="profileList" style="flex:1"></select>
              <button id="refreshProfiles" type="button">刷新</button>
            </div>
          </div>
          <div>
            <label>目录策略</label>
            <select id="folderMode">
              <option value="time_flat">时间单层（media_YYYYMMDD_HHMMSS）</option>
              <option value="time_nested">时间双层（media_YYYYMMDD/HHMMSS）</option>
              <option value="custom">自定义目录</option>
            </select>
          </div>
        </div>
        <div id="customDirWrap" style="display:none;margin-top:10px;">
          <label>自定义目录</label>
          <input id="customDir" placeholder="例如：project-a/2026-03" />
        </div>
        <div class="row" style="margin-top:10px;justify-content:space-between">
          <div id="connStatus" class="muted">请先选择 OSS 配置档；配置入口已迁移到独立页面。</div>
          <a href="/publisher/oss-config.html">前往 OSS 配置页</a>
        </div>
      </section>

      <section class="card">
        <div class="row" style="justify-content: space-between;">
          <strong>粘贴富文本（支持 Ctrl+V）</strong>
          <div class="row">
            <button id="pasteRawBtn" type="button">原样粘贴</button>
            <button id="pasteRichBtn" type="button">富文本转 Markdown</button>
            <button id="scanMedia" type="button">扫描 media</button>
            <button id="prevMedia" type="button">上一个</button>
            <button id="nextMedia" type="button">下一个</button>
            <span id="mediaStats">共发现 0 个 media</span>
          </div>
        </div>
        <div class="grid" style="margin-top:10px;">
          <div>
            <label>原始文本</label>
            <textarea id="pasteText" placeholder="粘贴 Markdown 或富文本"></textarea>
          </div>
          <div>
            <label>媒体列表（可排除）</label>
            <div id="mediaList" class="progress-list"></div>
            <div style="margin-top:10px;">
              <label>媒体预览</label>
              <div id="mediaPreview" class="preview-box"></div>
              <div id="mediaPreviewMeta" class="preview-meta">未选中媒体</div>
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="row" style="justify-content: space-between;">
          <button id="startReplace" class="btn" type="button">开始替换并上传</button>
          <strong id="progressText">待执行</strong>
        </div>
        <div class="progress-list" id="progressList" style="margin-top:10px;"></div>
      </section>

      <section class="card">
        <div class="row" style="justify-content: space-between; margin-bottom: 8px;">
          <label style="margin:0;">替换后正文（media 链接已替换为 OSS）</label>
          <div class="row">
            <button id="copyResult" type="button">复制结果</button>
            <button id="useResultAsInput" type="button">回填到输入</button>
            <button id="clearResult" type="button">清空结果</button>
          </div>
        </div>
        <textarea id="resultText"></textarea>
      </section>
    </main>
  </div>

  <script>
    const DRAFT_KEY = "publisher_media_upload_draft_v2";
    const tools = window.PublisherMediaTools;
    const state = { mediaItems: [], currentIndex: -1, excludedKeys: new Set() };

    const el = {
      profileList: document.getElementById("profileList"),
      refreshProfiles: document.getElementById("refreshProfiles"),
      connStatus: document.getElementById("connStatus"),
      folderMode: document.getElementById("folderMode"),
      customDirWrap: document.getElementById("customDirWrap"),
      customDir: document.getElementById("customDir"),
      pasteText: document.getElementById("pasteText"),
      mediaStats: document.getElementById("mediaStats"),
      mediaList: document.getElementById("mediaList"),
      mediaPreview: document.getElementById("mediaPreview"),
      mediaPreviewMeta: document.getElementById("mediaPreviewMeta"),
      pasteRawBtn: document.getElementById("pasteRawBtn"),
      pasteRichBtn: document.getElementById("pasteRichBtn"),
      prevMedia: document.getElementById("prevMedia"),
      nextMedia: document.getElementById("nextMedia"),
      scanMedia: document.getElementById("scanMedia"),
      startReplace: document.getElementById("startReplace"),
      progressText: document.getElementById("progressText"),
      progressList: document.getElementById("progressList"),
      resultText: document.getElementById("resultText"),
      copyResult: document.getElementById("copyResult"),
      useResultAsInput: document.getElementById("useResultAsInput"),
      clearResult: document.getElementById("clearResult"),
    };

    const toastStackEl = document.body.appendChild(document.createElement("div"));
    toastStackEl.className = "toast-stack";
    function showToast(message, isError = false) {
      if (!message) return;
      const toast = document.createElement("div");
      toast.className = `toast ${isError ? "err" : "ok"}`;
      toast.textContent = message;
      toastStackEl.appendChild(toast);
      setTimeout(() => {
        toast.classList.add("fade-out");
        setTimeout(() => toast.remove(), 220);
      }, 1800);
    }

    const readDraft = () => { try { return JSON.parse(sessionStorage.getItem(DRAFT_KEY) || "null"); } catch { return null; } };
    const saveDraft = () => {
      try {
        sessionStorage.setItem(DRAFT_KEY, JSON.stringify({
          profileList: el.profileList.value,
          folderMode: el.folderMode.value,
          customDir: el.customDir.value,
          pasteText: el.pasteText.value,
          resultText: el.resultText.value,
          excludedKeys: [...state.excludedKeys],
        }));
      } catch {}
    };

    function renderProfiles(selected) {
      const names = tools.listProfiles();
      el.profileList.innerHTML = "";
      const empty = document.createElement("option");
      empty.value = "";
      empty.textContent = names.length ? "请选择 OSS 配置档" : "暂无配置，请先前往 OSS 配置页";
      el.profileList.appendChild(empty);
      names.forEach((name) => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        el.profileList.appendChild(opt);
      });
      if (selected && names.includes(selected)) el.profileList.value = selected;
      updateProfileStatus();
    }

    function updateProfileStatus() {
      const profileName = el.profileList.value;
      const profile = tools.getProfile(profileName);
      if (!profileName || !profile) {
        el.connStatus.textContent = "请先选择 OSS 配置档；配置入口已迁移到独立页面。";
        el.connStatus.className = "muted";
        return;
      }
      el.connStatus.textContent = `当前配置：${profileName} | bucket=${profile.bucket || "-"} | region=${profile.region || "-"}`;
      el.connStatus.className = "ok";
    }

    function renderMediaPreview(item) {
      el.mediaPreview.innerHTML = "";
      if (!item) {
        el.mediaPreviewMeta.textContent = "未选中媒体";
        return;
      }
      el.mediaPreviewMeta.textContent = `#${item.index + 1} [${item.tag}]`;
      const src = item.src;
      const isVideo = /\.(mp4|mov|webm|m4v|avi|mkv)(\?|$)/i.test(src) || src.startsWith("data:video/");
      if (isVideo) {
        const v = document.createElement("video");
        v.controls = true;
        v.src = src;
        v.style.maxWidth = "100%";
        v.style.maxHeight = "260px";
        el.mediaPreview.appendChild(v);
        return;
      }
      const img = document.createElement("img");
      img.src = src;
      img.alt = "media preview";
      img.style.maxWidth = "100%";
      img.style.maxHeight = "260px";
      img.style.objectFit = "contain";
      img.onerror = () => {
        el.mediaPreview.innerHTML = `<a href="${src}" target="_blank" rel="noreferrer">预览失败，点此新窗口打开</a>`;
      };
      el.mediaPreview.appendChild(img);
    }

    function focusCurrentMedia() {
      const items = el.mediaList.querySelectorAll("[data-media-index]");
      items.forEach((node) => {
        node.style.background = "";
        node.style.borderRadius = "";
      });
      if (state.currentIndex < 0) {
        renderMediaPreview(null);
        return;
      }
      const node = el.mediaList.querySelector(`[data-media-index="${state.currentIndex}"]`);
      if (node) {
        node.style.background = "#ffe3bf";
        node.style.borderRadius = "6px";
        node.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
      renderMediaPreview(state.mediaItems[state.currentIndex]);
    }

    function scanMediaFromText() {
      state.mediaItems = tools.extractMediaRefs(el.pasteText.value || "");
      state.currentIndex = state.mediaItems.length > 0 ? Math.min(Math.max(state.currentIndex, 0), state.mediaItems.length - 1) : -1;
      const activeCount = state.mediaItems.filter((x) => !state.excludedKeys.has(tools.mediaKey(x))).length;
      el.mediaStats.textContent = `共发现 ${state.mediaItems.length} 个 media，待上传 ${activeCount} 个`;
      el.mediaList.innerHTML = "";

      state.mediaItems.forEach((item, i) => {
        const row = document.createElement("div");
        row.className = "progress-item";
        row.dataset.mediaIndex = String(i);
        const removed = state.excludedKeys.has(tools.mediaKey(item));
        const txt = document.createElement("span");
        txt.textContent = `#${i + 1} [${item.tag}] ${item.src}${removed ? " (已排除)" : ""}`;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = removed ? "恢复" : "排除";
        btn.style.padding = "4px 10px";
        btn.style.marginLeft = "8px";
        btn.addEventListener("click", (ev) => {
          ev.stopPropagation();
          const key = tools.mediaKey(item);
          if (state.excludedKeys.has(key)) state.excludedKeys.delete(key); else state.excludedKeys.add(key);
          scanMediaFromText();
          saveDraft();
        });
        row.appendChild(txt);
        row.appendChild(btn);
        row.addEventListener("click", () => {
          state.currentIndex = i;
          focusCurrentMedia();
        });
        el.mediaList.appendChild(row);
      });

      focusCurrentMedia();
    }

    function appendProgress(text, cls) {
      const div = document.createElement("div");
      div.className = `progress-item ${cls || ""}`.trim();
      div.textContent = text;
      el.progressList.appendChild(div);
      el.progressList.scrollTop = el.progressList.scrollHeight;
    }

    function getSelectedOssConfig() {
      const profileName = el.profileList.value;
      const profile = tools.getProfile(profileName);
      if (!profileName || !profile) throw new Error("请先选择有效的 OSS 配置档");
      return profile;
    }

    el.folderMode.addEventListener("change", () => {
      el.customDirWrap.style.display = el.folderMode.value === "custom" ? "block" : "none";
      saveDraft();
    });

    el.refreshProfiles.addEventListener("click", () => {
      renderProfiles(el.profileList.value);
      showToast("配置档列表已刷新");
    });

    el.profileList.addEventListener("change", () => {
      updateProfileStatus();
      saveDraft();
    });

    el.pasteRawBtn.addEventListener("click", async () => {
      try {
        const payload = await tools.readClipboardPayload();
        tools.insertAtCursor(el.pasteText, payload.value || "");
        scanMediaFromText();
        saveDraft();
        el.progressText.textContent = "已原样粘贴";
        showToast("已原样粘贴");
      } catch (err) {
        el.progressText.textContent = `粘贴失败: ${err.message}`;
        showToast(err.message, true);
      }
    });

    el.pasteRichBtn.addEventListener("click", async () => {
      try {
        const payload = await tools.readClipboardPayload();
        const text = payload.kind === "html" ? tools.htmlToMarkdown(payload.value) : payload.value;
        tools.insertAtCursor(el.pasteText, text || "");
        scanMediaFromText();
        saveDraft();
        el.progressText.textContent = payload.kind === "html" ? "已将富文本转为 Markdown 并粘贴" : "剪贴板无 HTML，按纯文本粘贴";
        showToast(payload.kind === "html" ? "富文本已转 Markdown" : "已按纯文本粘贴");
      } catch (err) {
        el.progressText.textContent = `粘贴失败: ${err.message}`;
        showToast(err.message, true);
      }
    });

    el.scanMedia.addEventListener("click", () => {
      scanMediaFromText();
      showToast(`扫描完成，共 ${state.mediaItems.length} 个 media`);
    });

    el.prevMedia.addEventListener("click", () => {
      if (!state.mediaItems.length) return;
      state.currentIndex = (state.currentIndex - 1 + state.mediaItems.length) % state.mediaItems.length;
      focusCurrentMedia();
    });

    el.nextMedia.addEventListener("click", () => {
      if (!state.mediaItems.length) return;
      state.currentIndex = (state.currentIndex + 1) % state.mediaItems.length;
      focusCurrentMedia();
    });

    el.startReplace.addEventListener("click", async () => {
      try {
        el.progressList.innerHTML = "";
        el.startReplace.disabled = true;
        const ossConfig = getSelectedOssConfig();
        el.progressText.textContent = "正在准备...";

        const result = await tools.replaceMediaInText({
          rawText: el.pasteText.value || "",
          ossConfig,
          folderMode: el.folderMode.value,
          customDir: el.customDir.value,
          excludedKeys: state.excludedKeys,
          timeoutMs: 45000,
          onStart(info) {
            if (!info.activeItems.length) {
              appendProgress("未发现可替换 media（可能都被排除）", "fail");
            } else {
              appendProgress(`开始上传，总数 ${info.activeItems.length}`);
            }
          },
          onProgress(evt) {
            if (evt.phase === "before") {
              el.progressText.textContent = `上传中 ${evt.done}/${evt.total}`;
              return;
            }
            if (evt.status === "success") {
              appendProgress(`[${evt.done}/${evt.total}] 成功 -> ${evt.upload.newSrc}`, "ok");
            } else {
              appendProgress(`[${evt.done}/${evt.total}] 失败 -> ${evt.error}`, "fail");
            }
            el.progressText.textContent = `进行中 ${evt.done}/${evt.total} (成功 ${evt.success} / 失败 ${evt.failed})`;
          }
        });

        if (!result.total) {
          el.progressText.textContent = "未执行";
          return;
        }

        el.resultText.value = result.replacedText;
        el.progressText.textContent = `完成: 成功 ${result.success} / 失败 ${result.failed}`;
        saveDraft();
        showToast(result.failed ? `上传完成，成功 ${result.success}，失败 ${result.failed}` : `上传完成，成功 ${result.success}`);
      } catch (err) {
        el.progressText.textContent = `失败: ${err.message}`;
        appendProgress(`任务失败: ${err.message}`, "fail");
        showToast(err.message, true);
      } finally {
        el.startReplace.disabled = false;
      }
    });

    el.copyResult.addEventListener("click", async () => {
      const text = el.resultText.value || "";
      if (!text) {
        el.progressText.textContent = "结果为空";
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        el.resultText.focus();
        el.resultText.select();
        document.execCommand("copy");
      }
      el.progressText.textContent = "结果已复制到剪贴板";
      showToast("结果已复制");
    });

    el.useResultAsInput.addEventListener("click", () => {
      el.pasteText.value = el.resultText.value || "";
      scanMediaFromText();
      saveDraft();
      el.progressText.textContent = "已回填到输入框";
      showToast("已回填到输入框");
    });

    el.clearResult.addEventListener("click", () => {
      el.resultText.value = "";
      saveDraft();
      el.progressText.textContent = "结果已清空";
      showToast("结果已清空");
    });

    ["input", "change"].forEach((evt) => {
      document.addEventListener(evt, (event) => {
        if (["folderMode", "customDir", "pasteText", "resultText"].includes(event.target.id)) saveDraft();
      });
    });

    el.pasteText.addEventListener("input", () => {
      setTimeout(() => {
        scanMediaFromText();
        saveDraft();
      }, 0);
    });

    (function init() {
      const draft = readDraft();
      renderProfiles(draft && draft.profileList);
      el.folderMode.value = draft && draft.folderMode || "time_flat";
      el.customDir.value = draft && draft.customDir || "";
      el.customDirWrap.style.display = el.folderMode.value === "custom" ? "block" : "none";
      el.pasteText.value = draft && draft.pasteText || "";
      el.resultText.value = draft && draft.resultText || "";
      state.excludedKeys = new Set((draft && draft.excludedKeys) || []);
      scanMediaFromText();
    })();
  </script>
</body>
</html>
