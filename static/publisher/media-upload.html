<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>富文本 Media 替换上传 OSS</title>
  <style>
    :root{--bg:#eef2f7;--panel:#fff;--line:#d7dee7;--text:#15202b;--muted:#637282;--brand:#0f766e;--brand2:#1e9b86;--danger:#b91c1c}

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .layout {
      display: grid;
      grid-template-columns: 250px minmax(0, 1fr);
      min-height: 100vh;
    }
    .side {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      background: linear-gradient(160deg, #0d3e39, #0b2e32);
      color:#dff7f4;
      padding: 20px;
    }
    .brand {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .nav a {
      display: block;
      color: #dff7f4;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .nav a.active, .nav a:hover {
      background:rgba(255,255,255,.14);
    }
    .main {
      min-width: 0;
      padding:18px;
    }
    .container {
      width:auto;
      margin:0;
      padding:0;
    }
    .top{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
    .top h1{margin:0 0 6px}
    .muted{color:var(--muted);font-size:13px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input, select, textarea, button { font: inherit; }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background:#fff;
      border-radius:10px;
      padding:10px;
      font-size:14px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--brand2);
    }
    button {
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
      font-size:14px;
      background:#fff;
      color:var(--text);
      font-weight:400;
      cursor: pointer;
    }
    .btn{border:none;background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff}
    button.secondary{background:#fff}
    button.warn{border:none;background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff}
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    #connStatus {
      padding: 4px 10px;
      border-radius: 999px;
      background:#eef2f7;
    }
    .progress-list {
      max-height: 240px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background:#fff;
    }
    #pasteText, #resultText {
      min-height: 280px;
      resize: vertical;
      font-family: Consolas, "Courier New", monospace;
      line-height: 1.5;
    }
    .progress-item {
      border-bottom: 1px dashed var(--line);
      padding: 6px 0;
      font-size: 13px;
    }
    .progress-item:last-child { border-bottom: 0; }
    .ok { color: #065f46; }
    .fail { color: #b91c1c; }
    .preview-box {
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background:#fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      overflow: auto;
    }
    .preview-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    .toast-stack{position:fixed;right:18px;bottom:18px;display:flex;flex-direction:column;gap:10px;z-index:9999;pointer-events:none}
    .toast{min-width:220px;max-width:360px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);box-shadow:0 12px 30px rgba(21,32,43,.12);opacity:0;transform:translateY(8px);animation:toast-in .18s ease forwards}
    .toast.ok{border-color:#b7e4d7;background:#effaf5;color:#065f46}.toast.err{border-color:#efb6b6;background:#fff5f5;color:#b91c1c}
    .toast.fade-out{animation:toast-out .22s ease forwards}
    @keyframes toast-in{to{opacity:1;transform:translateY(0)}}
    @keyframes toast-out{to{opacity:0;transform:translateY(8px)}}
    @media (max-width:980px) {
      .layout { grid-template-columns: 1fr; }
      .side { position: relative; height: auto; padding:14px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="side">
      <div class="brand">Publisher CMS</div>
      <nav class="nav">
        <a href="/publisher/">总览</a>
        <a href="/publisher/create.html">新建发布</a>
        <a href="/publisher/manage.html">内容管理</a>
        <a href="/publisher/media-upload.html" class="active">Media Upload</a>
        <a href="/publisher/template-manage.html">模板管理</a>
      </nav>
    </aside>
    <main class="main">
      <div class="container">
        <section class="top">
          <h1>富文本 Media 自动上传 OSS</h1>
          <div class="muted">直接在当前页面完成扫描、替换与上传，界面间距与 Publisher 其他页面保持一致。</div>
        </section>

        <section class="card">
      <div class="grid">
        <div>
          <label>AccessKeyId</label>
          <input id="accessKeyId" placeholder="填写阿里云 AccessKeyId" />
        </div>
        <div>
          <label>AccessKeySecret</label>
          <input id="accessKeySecret" type="password" placeholder="填写阿里云 AccessKeySecret" />
        </div>
        <div>
          <label>Region</label>
          <input id="region" placeholder="如 oss-cn-hangzhou" />
        </div>
        <div>
          <label>Bucket</label>
          <input id="bucket" placeholder="bucket 名称" />
        </div>
        <div>
          <label>Endpoint (可选)</label>
          <input id="endpoint" placeholder="如 https://oss-cn-hangzhou.aliyuncs.com" />
        </div>
        <div>
          <label>HTTPS</label>
          <select id="secure">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </div>
      </div>
      <div class="grid" style="margin-top: 10px;">
        <div>
          <label>配置名称</label>
          <input id="profileName" placeholder="例如：生产环境-杭州" />
        </div>
        <div>
          <label>已保存配置</label>
          <select id="profileList"></select>
        </div>
      </div>
      <div class="row" style="margin-top: 10px">
        <button id="saveProfile" class="secondary">保存配置</button>
        <button id="loadProfile" class="secondary">载入配置</button>
        <button id="deleteProfile" class="secondary">删除配置</button>
        <button id="testConn">验证 OSS 连接</button>
        <span id="connStatus"></span>
      </div>
        </section>

        <section class="card">
      <div class="grid">
        <div>
          <label>上传目录策略</label>
          <select id="folderMode">
            <option value="time_flat">时间单层（media_YYYYMMDD_HHMMSS）</option>
            <option value="time_nested">时间双层（media_YYYYMMDD/HHMMSS）</option>
            <option value="custom">自定义目录</option>
          </select>
        </div>
      </div>
      <div id="customDirWrap" style="display:none;margin-top:10px;">
        <label>自定义目录</label>
        <input id="customDir" placeholder="如 project-a/2026-03" />
      </div>
        </section>

        <section class="card">
      <div class="row" style="justify-content: space-between;">
        <strong>粘贴富文本（支持直接 Ctrl+V）</strong>
        <div class="row">
          <button id="pasteRawBtn" class="secondary">原样粘贴</button>
          <button id="pasteRichBtn" class="secondary">富文本转 Markdown 粘贴</button>
          <button id="scanMedia" class="secondary">扫描 media</button>
          <button id="prevMedia" class="secondary">上一个</button>
          <button id="nextMedia" class="secondary">下一个</button>
          <span id="mediaStats">共发现 0 个 media</span>
        </div>
      </div>
      <div class="grid" style="margin-top:10px;">
        <div>
          <label>原始富文本</label>
          <textarea id="pasteText" placeholder="粘贴 Markdown 或富文本原始文本"></textarea>
        </div>
        <div>
          <label>媒体列表（不渲染）</label>
          <div id="mediaList" class="progress-list"></div>
          <div style="margin-top:10px;">
            <label>媒体预览</label>
            <div id="mediaPreview" class="preview-box"></div>
            <div id="mediaPreviewMeta" class="preview-meta">未选中媒体</div>
          </div>
        </div>
      </div>
        </section>

        <section class="card">
      <div class="row" style="justify-content: space-between;">
        <button id="startReplace" class="warn">开始替换并上传</button>
        <strong id="progressText">待执行</strong>
      </div>
      <div class="progress-list" id="progressList" style="margin-top:10px;"></div>
        </section>

        <section class="card">
      <div class="row" style="justify-content: space-between; margin-bottom: 8px;">
        <label style="margin:0;">替换后富文本原始文本（media 链接已替换为 OSS）</label>
        <div class="row">
          <button id="copyResult" class="secondary">复制结果</button>
          <button id="useResultAsInput" class="secondary">回填到输入</button>
          <button id="clearResult" class="secondary">清空结果</button>
        </div>
      </div>
      <textarea id="resultText"></textarea>
        </section>
      </div>
    </main>
  </div>

  <script>
    const PROFILE_KEY = "oss_profiles_v1";
    const PUBLISHER_API_KEY = "publisher_api_base";
    const DRAFT_KEY = "publisher_media_upload_draft_v1";
    const DEFAULT_API_BASE = ["localhost", "127.0.0.1"].includes(location.hostname)
      ? "http://127.0.0.1:8790"
      : "";

    const state = {
      mediaItems: [],
      currentIndex: -1,
      excludedKeys: new Set(),
    };

    const el = {
      accessKeyId: document.getElementById("accessKeyId"),
      accessKeySecret: document.getElementById("accessKeySecret"),
      region: document.getElementById("region"),
      bucket: document.getElementById("bucket"),
      endpoint: document.getElementById("endpoint"),
      secure: document.getElementById("secure"),
      testConn: document.getElementById("testConn"),
      connStatus: document.getElementById("connStatus"),
      profileName: document.getElementById("profileName"),
      saveProfile: document.getElementById("saveProfile"),
      loadProfile: document.getElementById("loadProfile"),
      deleteProfile: document.getElementById("deleteProfile"),
      profileList: document.getElementById("profileList"),
      folderMode: document.getElementById("folderMode"),
      customDirWrap: document.getElementById("customDirWrap"),
      customDir: document.getElementById("customDir"),
      pasteText: document.getElementById("pasteText"),
      mediaStats: document.getElementById("mediaStats"),
      mediaList: document.getElementById("mediaList"),
      mediaPreview: document.getElementById("mediaPreview"),
      mediaPreviewMeta: document.getElementById("mediaPreviewMeta"),
      pasteRawBtn: document.getElementById("pasteRawBtn"),
      pasteRichBtn: document.getElementById("pasteRichBtn"),
      prevMedia: document.getElementById("prevMedia"),
      nextMedia: document.getElementById("nextMedia"),
      scanMedia: document.getElementById("scanMedia"),
      startReplace: document.getElementById("startReplace"),
      progressText: document.getElementById("progressText"),
      progressList: document.getElementById("progressList"),
      resultText: document.getElementById("resultText"),
      copyResult: document.getElementById("copyResult"),
      useResultAsInput: document.getElementById("useResultAsInput"),
      clearResult: document.getElementById("clearResult"),
    };
    const toastStackEl = document.body.appendChild(document.createElement("div"));
    toastStackEl.className = "toast-stack";
    function showToast(message, isError = false) {
      if (!message) return;
      const toast = document.createElement("div");
      toast.className = `toast ${isError ? "err" : "ok"}`;
      toast.textContent = message;
      toastStackEl.appendChild(toast);
      setTimeout(() => {
        toast.classList.add("fade-out");
        setTimeout(() => toast.remove(), 220);
      }, 1800);
    }
    const readDraft = () => { try { return JSON.parse(sessionStorage.getItem(DRAFT_KEY) || "null"); } catch { return null; } };
    const saveDraft = () => { try { sessionStorage.setItem(DRAFT_KEY, JSON.stringify({
      accessKeyId: el.accessKeyId.value,
      accessKeySecret: el.accessKeySecret.value,
      region: el.region.value,
      bucket: el.bucket.value,
      endpoint: el.endpoint.value,
      secure: el.secure.value,
      profileName: el.profileName.value,
      profileList: el.profileList.value,
      folderMode: el.folderMode.value,
      customDir: el.customDir.value,
      pasteText: el.pasteText.value,
      resultText: el.resultText.value,
      excludedKeys: [...state.excludedKeys]
    })); } catch {} };
    function restoreDraft() {
      const draft = readDraft();
      if (!draft) return;
      el.accessKeyId.value = draft.accessKeyId || "";
      el.accessKeySecret.value = draft.accessKeySecret || "";
      el.region.value = draft.region || "";
      el.bucket.value = draft.bucket || "";
      el.endpoint.value = draft.endpoint || "";
      el.secure.value = draft.secure || "true";
      el.profileName.value = draft.profileName || "";
      el.folderMode.value = draft.folderMode || "time_flat";
      el.customDir.value = draft.customDir || "";
      el.pasteText.value = draft.pasteText || "";
      el.resultText.value = draft.resultText || "";
      state.excludedKeys = new Set(draft.excludedKeys || []);
      el.customDirWrap.style.display = el.folderMode.value === "custom" ? "block" : "none";
    }

    function apiUrl(path) {
      const base = (localStorage.getItem(PUBLISHER_API_KEY) || DEFAULT_API_BASE || "").replace(/\/+$/, "");
      return base ? `${base}${path}` : path;
    }

    function insertAtCursor(textarea, text) {
      const start = textarea.selectionStart ?? textarea.value.length;
      const end = textarea.selectionEnd ?? textarea.value.length;
      const current = textarea.value;
      textarea.value = `${current.slice(0, start)}${text}${current.slice(end)}`;
      const nextPos = start + text.length;
      textarea.selectionStart = nextPos;
      textarea.selectionEnd = nextPos;
      textarea.focus();
    }

    function normalizeInlineText(text) {
      return String(text || "").replace(/\s+/g, " ").trim();
    }

    function htmlToMarkdown(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");

      function walk(node, inPre = false) {
        if (node.nodeType === Node.TEXT_NODE) {
          return inPre ? node.nodeValue || "" : normalizeInlineText(node.nodeValue || "");
        }
        if (node.nodeType !== Node.ELEMENT_NODE) {
          return "";
        }

        const tag = node.tagName.toLowerCase();
        const children = Array.from(node.childNodes).map((n) => walk(n, inPre || tag === "pre"));
        const joined = children.join(inPre ? "" : " ").replace(/[ \t]+\n/g, "\n").trim();

        if (/^h[1-6]$/.test(tag)) {
          const level = Number(tag[1]);
          return `${"#".repeat(level)} ${joined}\n\n`;
        }
        if (tag === "p") return `${joined}\n\n`;
        if (tag === "br") return "\n";
        if (tag === "strong" || tag === "b") return `**${joined}**`;
        if (tag === "em" || tag === "i") return `*${joined}*`;
        if (tag === "code" && node.parentElement?.tagName.toLowerCase() !== "pre") return `\`${joined}\``;
        if (tag === "pre") {
          const code = node.textContent || "";
          return `\n\`\`\`\n${code.replace(/\n$/, "")}\n\`\`\`\n\n`;
        }
        if (tag === "img") {
          const src = node.getAttribute("src") || "";
          const alt = node.getAttribute("alt") || "img";
          return src ? `![${alt}](${src})` : "";
        }
        if (tag === "a") {
          const href = node.getAttribute("href") || "";
          const text = joined || href;
          return href ? `[${text}](${href})` : text;
        }
        if (tag === "li") return `- ${joined}\n`;
        if (tag === "ul" || tag === "ol") return `${children.join("")}\n`;
        if (tag === "blockquote") {
          return `${joined.split("\n").map((l) => `> ${l}`).join("\n")}\n\n`;
        }
        if (tag === "div" || tag === "section" || tag === "article") return `${joined}\n\n`;
        return joined;
      }

      const out = Array.from(doc.body.childNodes).map((n) => walk(n)).join("");
      return out.replace(/\n{3,}/g, "\n\n").trim();
    }

    async function readClipboardPayload() {
      if (!navigator.clipboard) {
        throw new Error("浏览器不支持 Clipboard API");
      }

      if (navigator.clipboard.read) {
        const items = await navigator.clipboard.read();
        for (const item of items) {
          if (item.types.includes("text/html")) {
            const blob = await item.getType("text/html");
            return { kind: "html", value: await blob.text() };
          }
          if (item.types.includes("text/plain")) {
            const blob = await item.getType("text/plain");
            return { kind: "plain", value: await blob.text() };
          }
        }
      }

      const text = await navigator.clipboard.readText();
      return { kind: "plain", value: text || "" };
    }

    function getOssConfig() {
      return {
        accessKeyId: el.accessKeyId.value.trim(),
        accessKeySecret: el.accessKeySecret.value.trim(),
        region: el.region.value.trim(),
        bucket: el.bucket.value.trim(),
        endpoint: el.endpoint.value.trim(),
        secure: el.secure.value === "true",
      };
    }

    function setOssConfig(cfg) {
      el.accessKeyId.value = cfg.accessKeyId || "";
      el.accessKeySecret.value = cfg.accessKeySecret || "";
      el.region.value = cfg.region || "";
      el.bucket.value = cfg.bucket || "";
      el.endpoint.value = cfg.endpoint || "";
      el.secure.value = String(cfg.secure !== false);
    }

    function readProfiles() {
      try {
        const raw = localStorage.getItem(PROFILE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch {
        return {};
      }
    }

    function writeProfiles(profiles) {
      localStorage.setItem(PROFILE_KEY, JSON.stringify(profiles));
    }

    function refreshProfileList() {
      const profiles = readProfiles();
      const names = Object.keys(profiles).sort();
      el.profileList.innerHTML = "";

      const empty = document.createElement("option");
      empty.value = "";
      empty.textContent = "请选择已保存配置";
      el.profileList.appendChild(empty);

      names.forEach((name) => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        el.profileList.appendChild(opt);
      });
      const draft = readDraft();
      if (draft?.profileList && [...el.profileList.options].some((opt) => opt.value === draft.profileList)) {
        el.profileList.value = draft.profileList;
      }
    }

    async function postJson(url, body) {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok || data.ok === false) {
        throw new Error(data.message || `Request failed: ${res.status}`);
      }
      return data;
    }

    async function postJsonWithTimeout(url, body, timeoutMs = 45000) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
          signal: controller.signal,
        });
        const data = await res.json();
        if (!res.ok || data.ok === false) {
          throw new Error(data.message || `Request failed: ${res.status}`);
        }
        return data;
      } catch (err) {
        if (err.name === "AbortError") {
          throw new Error(`请求超时(${Math.floor(timeoutMs / 1000)}s)，已跳过`);
        }
        throw err;
      } finally {
        clearTimeout(timer);
      }
    }

    function appendProgress(text, cls = "") {
      const div = document.createElement("div");
      div.className = `progress-item ${cls}`.trim();
      div.textContent = text;
      el.progressList.appendChild(div);
      el.progressList.scrollTop = el.progressList.scrollHeight;
    }

    function isMediaLink(src) {
      return /\.(png|jpe?g|gif|webp|bmp|svg|mp4|mov|webm|m4v|avi|mkv)(\?|$)/i.test(src) ||
        src.includes("/space/api/box/stream/download/") ||
        src.startsWith("data:image/") ||
        src.startsWith("data:video/") ||
        src.startsWith("blob:");
    }

    function isOverlap(start, end, ranges) {
      return ranges.some((r) => !(end <= r.start || start >= r.end));
    }

    function extractMediaRefs(rawText) {
      const ranges = [];

      const mdRegex = /(!?\[[^\]]*\]\()([^\s)]+)(\))/g;
      let m;
      while ((m = mdRegex.exec(rawText)) !== null) {
        const src = m[2];
        if (!isMediaLink(src)) continue;

        const start = m.index + m[1].length;
        const end = start + src.length;
        if (isOverlap(start, end, ranges)) continue;

        ranges.push({ start, end, src, tag: m[1].startsWith("![") ? "markdown-image" : "markdown-link" });
      }

      const htmlRegex = /(src|href)\s*=\s*(?:"([^"]+)"|'([^']+)')/gi;
      while ((m = htmlRegex.exec(rawText)) !== null) {
        const src = m[2] || m[3] || "";
        if (!isMediaLink(src)) continue;

        const whole = m[0];
        const rel = whole.indexOf(src);
        if (rel < 0) continue;

        const start = m.index + rel;
        const end = start + src.length;
        if (isOverlap(start, end, ranges)) continue;

        ranges.push({ start, end, src, tag: `html-${String(m[1]).toLowerCase()}` });
      }

      const urlRegex = /https?:\/\/[^\s<>")']+/g;
      while ((m = urlRegex.exec(rawText)) !== null) {
        const src = m[0];
        if (!isMediaLink(src)) continue;

        const start = m.index;
        const end = start + src.length;
        if (isOverlap(start, end, ranges)) continue;

        ranges.push({ start, end, src, tag: "plain-url" });
      }

      ranges.sort((a, b) => a.start - b.start);
      return ranges.map((r, i) => ({
        index: i,
        start: r.start,
        end: r.end,
        src: r.src,
        tag: r.tag,
        sourceType: r.src.startsWith("data:") ? "dataUrl" : "url",
      }));
    }

    function mediaKey(item) {
      return `${item.start}:${item.end}:${item.src}`;
    }

    function tokenizeMedia(rawText, mediaItems) {
      const items = Array.isArray(mediaItems) ? mediaItems : extractMediaRefs(rawText);
      const mediaItemsFinal = items.filter((x) => !state.excludedKeys.has(mediaKey(x)));
      let textWithMarkers = String(rawText || "");

      const reversed = [...mediaItemsFinal].reverse();
      reversed.forEach((item) => {
        item.marker = `__MEDIA_REPLACE_${item.index}_${Date.now()}__`;
        textWithMarkers = textWithMarkers.slice(0, item.start) + item.marker + textWithMarkers.slice(item.end);
      });

      return { mediaItems: mediaItemsFinal, textWithMarkers };
    }

    function renderMediaPreview(item) {
      el.mediaPreview.innerHTML = "";
      if (!item) {
        el.mediaPreviewMeta.textContent = "未选中媒体";
        return;
      }

      el.mediaPreviewMeta.textContent = `#${item.index + 1} [${item.tag}]`;
      const src = item.src;
      const isVideo = /\.(mp4|mov|webm|m4v|avi|mkv)(\?|$)/i.test(src) || src.startsWith("data:video/");

      if (isVideo) {
        const v = document.createElement("video");
        v.controls = true;
        v.src = src;
        v.style.maxWidth = "100%";
        v.style.maxHeight = "260px";
        el.mediaPreview.appendChild(v);
      } else {
        const img = document.createElement("img");
        img.src = src;
        img.alt = "media preview";
        img.style.maxWidth = "100%";
        img.style.maxHeight = "260px";
        img.style.objectFit = "contain";
        img.onerror = () => {
          el.mediaPreview.innerHTML = `<a href="${src}" target="_blank" rel="noreferrer">预览失败，点此新窗口打开</a>`;
        };
        el.mediaPreview.appendChild(img);
      }
    }

    function scanMediaFromText() {
      state.mediaItems = extractMediaRefs(el.pasteText.value);
      state.currentIndex = state.mediaItems.length > 0 ? 0 : -1;

      const activeCount = state.mediaItems.filter((x) => !state.excludedKeys.has(mediaKey(x))).length;
      el.mediaStats.textContent = `共发现 ${state.mediaItems.length} 个 media，待上传 ${activeCount} 个`;
      el.mediaList.innerHTML = "";

      state.mediaItems.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "progress-item";
        div.dataset.mediaIndex = String(i);
        const removed = state.excludedKeys.has(mediaKey(item));
        div.textContent = `#${i + 1} [${item.tag}] ${item.src}${removed ? "  (已排除)" : ""}`;
        const removeBtn = document.createElement("button");
        removeBtn.className = "secondary";
        removeBtn.textContent = removed ? "恢复" : "删除";
        removeBtn.style.padding = "4px 10px";
        removeBtn.style.marginLeft = "8px";
        removeBtn.addEventListener("click", (ev) => {
          ev.stopPropagation();
          const key = mediaKey(item);
          if (state.excludedKeys.has(key)) {
            state.excludedKeys.delete(key);
          } else {
            state.excludedKeys.add(key);
          }
          scanMediaFromText();
          saveDraft();
        });
        div.appendChild(removeBtn);
        div.addEventListener("click", () => {
          state.currentIndex = i;
          focusCurrentMedia();
        });
        el.mediaList.appendChild(div);
      });

      focusCurrentMedia();
    }

    function focusCurrentMedia() {
      const items = el.mediaList.querySelectorAll("[data-media-index]");
      items.forEach((node) => {
        node.style.background = "";
        node.style.borderRadius = "";
      });

      if (state.currentIndex < 0) {
        renderMediaPreview(null);
        return;
      }

      const node = el.mediaList.querySelector(`[data-media-index="${state.currentIndex}"]`);
      if (node) {
        node.style.background = "#ffe3bf";
        node.style.borderRadius = "6px";
        node.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }

      renderMediaPreview(state.mediaItems[state.currentIndex]);
    }

    el.folderMode.addEventListener("change", () => {
      el.customDirWrap.style.display = el.folderMode.value === "custom" ? "block" : "none";
    });

    el.saveProfile.addEventListener("click", () => {
      const name = el.profileName.value.trim();
      if (!name) {
        el.connStatus.textContent = "请先填写配置名称";
        el.connStatus.className = "fail";
        return;
      }

      const profiles = readProfiles();
      profiles[name] = getOssConfig();
      writeProfiles(profiles);
      refreshProfileList();
      el.profileList.value = name;
      saveDraft();
      el.connStatus.textContent = `已保存配置: ${name}`;
      el.connStatus.className = "ok";
      showToast(`已保存配置：${name}`);
    });

    el.loadProfile.addEventListener("click", () => {
      const name = el.profileList.value;
      const profiles = readProfiles();
      const config = profiles[name];

      if (!name || !config) {
        el.connStatus.textContent = "请选择有效配置";
        el.connStatus.className = "fail";
        return;
      }

      setOssConfig(config);
      el.profileName.value = name;
      saveDraft();
      el.connStatus.textContent = `已载入配置: ${name}`;
      el.connStatus.className = "ok";
      showToast(`已载入配置：${name}`);
    });

    el.deleteProfile.addEventListener("click", () => {
      const name = el.profileList.value;
      const profiles = readProfiles();

      if (!name || !profiles[name]) {
        el.connStatus.textContent = "请选择有效配置";
        el.connStatus.className = "fail";
        return;
      }

      delete profiles[name];
      writeProfiles(profiles);
      refreshProfileList();
      el.profileName.value = "";
      saveDraft();
      el.connStatus.textContent = `已删除配置: ${name}`;
      el.connStatus.className = "ok";
      showToast(`已删除配置：${name}`);
    });

    el.testConn.addEventListener("click", async () => {
      try {
        el.connStatus.textContent = "连接中...";
        const result = await postJson(apiUrl("/api/oss/test"), getOssConfig());
        el.connStatus.textContent = `连接成功: ${result.bucket} (${result.region})`;
        el.connStatus.className = "ok";
        showToast("OSS 连接成功");
      } catch (err) {
        el.connStatus.textContent = `连接失败: ${err.message}`;
        el.connStatus.className = "fail";
        showToast(err.message, true);
      }
    });

    el.pasteRawBtn.addEventListener("click", async () => {
      try {
        const payload = await readClipboardPayload();
        const text = payload.value || "";
        insertAtCursor(el.pasteText, text);
        scanMediaFromText();
        saveDraft();
        el.progressText.textContent = "已按原样粘贴到输入框";
        showToast("已按原样粘贴");
      } catch (err) {
        el.progressText.textContent = `原样粘贴失败: ${err.message}`;
        showToast(err.message, true);
      }
    });

    el.pasteRichBtn.addEventListener("click", async () => {
      try {
        const payload = await readClipboardPayload();
        const text = payload.kind === "html" ? htmlToMarkdown(payload.value) : payload.value;
        insertAtCursor(el.pasteText, text || "");
        scanMediaFromText();
        saveDraft();
        el.progressText.textContent = payload.kind === "html"
          ? "已完成富文本转 Markdown 粘贴"
          : "剪贴板无 HTML，已按纯文本粘贴";
        showToast(payload.kind === "html" ? "已完成富文本转 Markdown 粘贴" : "已按纯文本粘贴");
      } catch (err) {
        el.progressText.textContent = `富文本粘贴失败: ${err.message}`;
        showToast(err.message, true);
      }
    });

    el.pasteText.addEventListener("paste", () => {
      setTimeout(() => { scanMediaFromText(); saveDraft(); }, 0);
    });
    el.pasteText.addEventListener("input", () => {
      setTimeout(() => { scanMediaFromText(); saveDraft(); }, 0);
    });

    el.scanMedia.addEventListener("click", () => {
      scanMediaFromText();
      showToast(`扫描完成：${state.mediaItems.length} 个 media`);
    });

    el.prevMedia.addEventListener("click", () => {
      if (!state.mediaItems.length) return;
      state.currentIndex = (state.currentIndex - 1 + state.mediaItems.length) % state.mediaItems.length;
      focusCurrentMedia();
      showToast(`已定位到第 ${state.currentIndex + 1} 个 media`);
    });

    el.nextMedia.addEventListener("click", () => {
      if (!state.mediaItems.length) return;
      state.currentIndex = (state.currentIndex + 1) % state.mediaItems.length;
      focusCurrentMedia();
      showToast(`已定位到第 ${state.currentIndex + 1} 个 media`);
    });

    el.startReplace.addEventListener("click", async () => {
      try {
        el.progressList.innerHTML = "";
        el.progressText.textContent = "正在准备...";
        el.startReplace.disabled = true;
        showToast("开始替换并上传");

        const latestItems = extractMediaRefs(el.pasteText.value);
        const tokenized = tokenizeMedia(el.pasteText.value, latestItems);
        if (!tokenized.mediaItems.length) {
          appendProgress("未发现可替换 media（或均已手动排除）", "fail");
          el.progressText.textContent = "未执行";
          return;
        }

        const total = tokenized.mediaItems.length;
        let done = 0;
        let success = 0;
        let failed = 0;
        let replacedText = tokenized.textWithMarkers;

        appendProgress(`开始上传，总数 ${total}`);

        for (let i = 0; i < tokenized.mediaItems.length; i += 1) {
          const item = tokenized.mediaItems[i];
          el.progressText.textContent = `上传中: ${done}/${total}`;

          try {
            const result = await postJsonWithTimeout(apiUrl("/api/media/upload-one"), {
              ossConfig: getOssConfig(),
              item,
              index: i,
              folderMode: el.folderMode.value,
              customDir: el.customDir.value,
            }, 45000);

            const upload = result.upload || {};
            done += 1;
            success += 1;
            if (upload.marker && upload.newSrc) {
              replacedText = replacedText.split(upload.marker).join(upload.newSrc);
            }
            appendProgress(`[${done}/${total}] 成功 -> ${upload.newSrc}`, "ok");
          } catch (err) {
            done += 1;
            failed += 1;
            appendProgress(`[${done}/${total}] 失败 -> ${err.message}`, "fail");
          }

          el.progressText.textContent = `进行中: ${done}/${total} (成功 ${success} / 失败 ${failed})`;
        }

        el.progressText.textContent = `完成: 成功 ${success} / 失败 ${failed}`;
        el.resultText.value = replacedText;
        saveDraft();
        showToast(failed ? `上传完成，成功 ${success}，失败 ${failed}` : `上传完成，成功 ${success}`);
      } catch (err) {
        el.progressText.textContent = `失败: ${err.message}`;
        appendProgress(`任务失败: ${err.message}`, "fail");
        showToast(err.message, true);
      } finally {
        el.startReplace.disabled = false;
      }
    });

    el.copyResult.addEventListener("click", async () => {
      const text = el.resultText.value || "";
      if (!text) {
        el.progressText.textContent = "结果为空，无可复制内容";
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        el.progressText.textContent = "结果已复制到剪贴板";
        showToast("结果已复制到剪贴板");
      } catch {
        el.resultText.focus();
        el.resultText.select();
        document.execCommand("copy");
        el.progressText.textContent = "结果已复制到剪贴板";
        showToast("结果已复制到剪贴板");
      }
    });

    el.useResultAsInput.addEventListener("click", () => {
      el.pasteText.value = el.resultText.value || "";
      scanMediaFromText();
      saveDraft();
      el.progressText.textContent = "已将结果回填到输入框";
      showToast("已将结果回填到输入框");
    });

    el.clearResult.addEventListener("click", () => {
      el.resultText.value = "";
      saveDraft();
      el.progressText.textContent = "结果已清空";
      showToast("结果已清空");
    });

    ["input", "change"].forEach((evt) => document.addEventListener(evt, (event) => {
      if (["accessKeyId","accessKeySecret","region","bucket","endpoint","secure","profileName","profileList","folderMode","customDir","resultText"].includes(event.target.id)) saveDraft();
    }));

    refreshProfileList();
    restoreDraft();
    scanMediaFromText();
  </script>
</body>
</html>
