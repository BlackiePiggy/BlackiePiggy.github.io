<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Template CMS | 编辑文章</title>
  <link rel="icon" type="image/svg+xml" href="/publisher/favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root{--bg:#eef2f7;--panel:#fff;--line:#d7dee7;--text:#15202b;--muted:#637282;--brand:#0f766e;--brand2:#1e9b86}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .layout{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
    .side{position:sticky;top:0;height:100vh;overflow-y:auto;background:linear-gradient(160deg,#0d3e39,#0b2e32);color:#dff7f4;padding:20px}
    .brand{font-size:20px;font-weight:700;margin-bottom:20px}
    .nav a{display:block;color:#dff7f4;text-decoration:none;padding:10px 12px;border-radius:10px;margin-bottom:6px}
    .nav a.active,.nav a:hover{background:rgba(255,255,255,.14)}
    .main{padding:18px}.top,.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
    .top{margin-bottom:14px}.top h1{margin:0 0 6px}.muted{color:var(--muted);font-size:13px}
    .panel{margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input,textarea,button{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;background:#fff}
    textarea{min-height:160px}.btn{border:none;background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff;cursor:pointer}
    .obj,.list-item{border:1px dashed var(--line);border-radius:10px;padding:8px;margin:8px 0}.inline{display:flex;gap:8px}.inline>*{width:auto}
    .md-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .md-preview{border:1px solid var(--line);border-radius:10px;padding:10px;background:#fbfdff;min-height:160px;overflow:auto}
    .md-preview img{display:block;width:80%;max-width:80%;height:auto;margin:10px auto}
    .preview{max-width:220px;border:1px solid var(--line);border-radius:10px;display:none}.status{white-space:pre-wrap;font-size:13px}
    .toast-stack{position:fixed;right:18px;top:18px;display:flex;flex-direction:column;gap:10px;z-index:9999;pointer-events:none}
    .toast{min-width:220px;max-width:360px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);box-shadow:0 12px 30px rgba(21,32,43,.12);opacity:0;transform:translateY(8px);animation:toast-in .18s ease forwards}
    .toast.ok{border-color:#b7e4d7;background:#effaf5;color:#065f46}.toast.err{border-color:#efb6b6;background:#fff5f5;color:#b91c1c}
    .toast.fade-out{animation:toast-out .22s ease forwards}
    @keyframes toast-in{to{opacity:1;transform:translateY(0)}}
    @keyframes toast-out{to{opacity:0;transform:translateY(8px)}}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.side{position:relative;height:auto}.grid{grid-template-columns:1fr}.md-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="layout">
  <aside class="side">
    <div class="brand">Publisher CMS</div>
    <nav class="nav">
      <a href="/publisher/">总览</a>
      <a href="/publisher/profile-manage.html">主页资料</a>
      <a href="/publisher/home-modules.html">首页模块</a>
      <a href="/publisher/create.html">新建发布</a>
      <a href="/publisher/manage.html" class="active">内容管理</a>
      <a href="/publisher/media-upload.html">Media Upload</a>
      <a href="/publisher/template-manage.html">模板管理</a>
    </nav>
  </aside>

  <main class="main">
    <section class="top">
      <h1>编辑文章</h1>
      <div class="muted">修改后会覆盖当前 slug 对应内容。</div>
    </section>

    <section class="panel">
      <div class="grid">
        <div class="field"><label>API 地址</label><input id="apiBase" /></div>
        <div class="field"><label>密码</label><input id="password" type="password" /></div>
      </div>
      <div class="grid" style="margin-top:10px">
        <div class="field"><label>Template</label><input id="template" readonly /></div>
        <div class="field"><label>Slug</label><input id="slug" readonly /></div>
      </div>
      <div class="field" style="margin-top:10px"><label>更新 Featured 图（可选）</label><input id="featuredFile" type="file" accept="image/*" /></div>
      <img id="preview" class="preview" alt="">
    </section>

    <section class="panel"><div id="formRoot"></div></section>
    <section class="panel"><button id="submitBtn" class="btn">确认修改（覆盖）</button><div id="status" class="status" style="margin-top:10px"></div></section>
  </main>
</div>

<script>
let templates=[],featuredData=null;
const qs=new URLSearchParams(location.search),tpl=qs.get("template")||"",sg=qs.get("slug")||"";
const local=["localhost","127.0.0.1"].includes(location.hostname);
const apiBaseInput=document.getElementById("apiBase");
const passwordInput=document.getElementById("password");
const templateInput=document.getElementById("template");
const slugInput=document.getElementById("slug");
const featuredFileInput=document.getElementById("featuredFile");
const previewImg=document.getElementById("preview");
const formRootEl=document.getElementById("formRoot");
const submitBtnEl=document.getElementById("submitBtn");
const statusEl=document.getElementById("status");
const toastStackEl=document.body.appendChild(document.createElement("div"));
toastStackEl.className="toast-stack";
apiBaseInput.value=localStorage.getItem("publisher_api_base")||(local?"http://127.0.0.1:8790":"");
passwordInput.value=localStorage.getItem("publisher_password")||(local?"123456":"");
templateInput.value=tpl;slugInput.value=sg;
const base=()=>apiBaseInput.value.replace(/\/+$/,"");
const nowIso=()=>{const d=new Date(),p=n=>String(n).padStart(2,"0"),o=-d.getTimezoneOffset(),s=o>=0?"+":"-";return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}${s}${p(Math.floor(Math.abs(o)/60))}:${p(Math.abs(o)%60)}`};
const e=(t,a={},c=[])=>{const n=document.createElement(t);Object.entries(a).forEach(([k,v])=>k==="text"?n.textContent=v:n.setAttribute(k,v));c.forEach(x=>n.appendChild(x));return n};
const READING_WORDS_PER_MIN=200;
function showToast(message,isError=false){if(!message)return;const toast=e("div",{class:`toast ${isError?"err":"ok"}`,text:message});toastStackEl.appendChild(toast);setTimeout(()=>{toast.classList.add("fade-out");setTimeout(()=>toast.remove(),220);},1800);}
const st=(m,e=false,notify=false)=>{statusEl.style.color=e?"#b91c1c":"#065f46";statusEl.textContent=m;if(notify)showToast(String(m).split("\n")[0],e)};
const setByPath=(o,p,v)=>{const ps=p.replace(/\[(\d+)\]/g,".$1").split(".");let cur=o;ps.forEach((k,i)=>{if(i===ps.length-1)cur[k]=v;else{if(cur[k]==null)cur[k]=/^\d+$/.test(ps[i+1])?[]:{};cur=cur[k];}})};
const getByPath=(o,p)=>p.replace(/\[(\d+)\]/g,".$1").split(".").reduce((a,k)=>a==null?undefined:a[k],o);
const clone=v=>JSON.parse(JSON.stringify(v));
function withDefaults(f,values,path){const x=clone(f),v=getByPath(values,path);if(v!==undefined)x.default=v;if(x.type==="object"&&x.fields)x.fields=x.fields.map(s=>withDefaults(s,values,`${path}.${s.name}`));if(x.type==="list"&&x.fields&&Array.isArray(v))x.default=v;return x;}
function renderField(f,path){
  if(f.type==="object"){const b=e("div",{class:"obj"});b.appendChild(e("label",{text:f.name}));(f.fields||[]).forEach(s=>b.appendChild(renderField(s,`${path}.${s.name}`)));return b;}
  if(f.type==="list"){const b=e("div",{class:"field"});b.appendChild(e("label",{text:f.name}));const r=e("div");const add=e("button",{type:"button",text:"添加一项"});add.onclick=()=>addListItem(f,r,path,undefined,r.children.length);b.appendChild(r);b.appendChild(add);(Array.isArray(f.default)?f.default:[]).forEach((v,i)=>addListItem(f,r,path,v,i));return b;}
  const b=e("div",{class:"field"});b.appendChild(e("label",{text:f.name})); if(f.name==="body"){const wrap=e("div",{class:"md-grid"});const ta=e("textarea",{"data-path":path,"data-md":"1"});if(f.default)ta.value=f.default;const pv=e("div",{class:"md-preview","data-preview-for":path});wrap.appendChild(ta);wrap.appendChild(pv);b.appendChild(wrap);const tools=e("div",{class:"inline",style:"margin-top:8px;align-items:center;flex-wrap:wrap"});const calcBtn=e("button",{type:"button",text:"计算阅读信息"});calcBtn.onclick=()=>updateReadingMetricsFromBody(path);const calcResult=e("span",{"data-reading-result-for":path,text:""});calcResult.style.fontSize="12px";calcResult.style.color="var(--muted)";tools.appendChild(calcBtn);tools.appendChild(calcResult);b.appendChild(tools);if(!document.querySelector('[data-path="word_count"]')){const wc=e("input",{type:"number","data-path":"word_count"});wc.hidden=true;b.appendChild(wc);}if(!document.querySelector('[data-path="reading_time"]')){const rt=e("input",{type:"number","data-path":"reading_time"});rt.hidden=true;b.appendChild(rt);}return b;}
  const type=f.type==="datetime"?"datetime-local":(f.type==="number"?"number":(f.type==="boolean"?"checkbox":"text")); const input=e("input",{type,"data-path":path});
  if(f.default!=null){if(type==="checkbox")input.checked=!!f.default;else if(type==="datetime-local")input.value=String(f.default).slice(0,16);else input.value=f.default;}
  if(f.type==="datetime"){const w=e("div",{class:"inline"}),btn=e("button",{type:"button",text:"当前时刻"});btn.onclick=()=>input.value=nowIso().slice(0,16);w.appendChild(input);w.appendChild(btn);b.appendChild(w);} else b.appendChild(input);
  return b;
}
function addListItem(f,r,path,val,idx){const i=e("div",{class:"list-item"});if(f.itemType==="object")(f.fields||[]).forEach(s=>{const x=clone(s);if(val&&val[s.name]!==undefined)x.default=val[s.name];i.appendChild(renderField(x,`${path}[${idx}].${s.name}`));});else i.appendChild(renderField({name:"item",type:f.itemType||"string",default:val??""},`${path}[${idx}]`));const rm=e("button",{type:"button",text:"删除"});rm.onclick=()=>i.remove();i.appendChild(rm);r.appendChild(i);}
function collect(){const out={};document.querySelectorAll("[data-path]").forEach(el=>{const p=el.dataset.path;let v;if(el.type==="checkbox")v=el.checked;else if(el.type==="number")v=el.value===""?null:Number(el.value);else if(el.type==="datetime-local")v=el.value?`${el.value}:00${nowIso().slice(-6)}`:"";else v=el.value;if(v!==""&&v!==null)setByPath(out,p,v)});return out;}
function escapeHtml(s){return String(s||"").replace(/[&<>"']/g,m=>({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[m]));}
function renderMarkdown(md){if(window.marked&&window.marked.parse)return window.marked.parse(md||"");return `<pre>${escapeHtml(md||"")}</pre>`;}
function countWordsFromBody(text){const src=String(text||"").trim();if(!src)return 0;const cjk=(src.match(/[\u3400-\u9FFF\uF900-\uFAFF]/g)||[]).length;const latin=(src.replace(/[\u3400-\u9FFF\uF900-\uFAFF]/g," ").match(/[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)*/g)||[]).length;return cjk+latin;}
function updateReadingInfoBadge(bodyPath){const wc=document.querySelector('[data-path="word_count"]');const rt=document.querySelector('[data-path="reading_time"]');const label=document.querySelector(`[data-reading-result-for="${bodyPath}"]`);if(!label)return;const words=Number(wc&&wc.value||0);const mins=Number(rt&&rt.value||0);label.textContent=words>0&&mins>0?`${words} words, ${mins} mins`:"";}
function updateReadingMetricsFromBody(bodyPath){const ta=document.querySelector(`textarea[data-path="${bodyPath}"]`);if(!ta||!ta.value.trim()){st("请先填写正文内容，再计算阅读信息。",true,true);return;}const words=countWordsFromBody(ta.value);const mins=Math.max(1,Math.ceil(words/READING_WORDS_PER_MIN));const wc=document.querySelector('[data-path="word_count"]');const rt=document.querySelector('[data-path="reading_time"]');if(wc)wc.value=String(words);if(rt)rt.value=String(mins);updateReadingInfoBadge(bodyPath);showToast(`已计算：${words} words, ${mins} mins`);}
function bindBodyPreview(){document.querySelectorAll("textarea[data-md='1']").forEach((ta)=>{const path=ta.dataset.path;const pv=document.querySelector(`[data-preview-for="${path}"]`);if(!pv)return;const update=()=>pv.innerHTML=renderMarkdown(ta.value);ta.addEventListener("input",update);update();updateReadingInfoBadge(path);});}
function renderForm(values){const t=templates.find(x=>x.name===tpl);if(!t)throw new Error(`模板不存在: ${tpl}`);formRootEl.innerHTML="";let fs=t.fields.map(f=>withDefaults(f,values,f.name));if(!fs.some(x=>x.name==="body"))fs.push({name:"body",type:"string",default:values.body||""});fs.forEach(f=>formRootEl.appendChild(renderField(f,f.name)));bindBodyPreview();}
featuredFileInput.onchange=(ev)=>{const f=ev.target.files&&ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{const rs=r.result;featuredData={name:f.name,mimeType:f.type||"image/png",base64:rs.slice(rs.indexOf(",")+1)};previewImg.src=rs;previewImg.style.display="block";showToast("已选择新的 Featured 图")};r.readAsDataURL(f)};
document.addEventListener("paste",(ev)=>{for(const i of ev.clipboardData.items){if(i.type.startsWith("image/")){const f=i.getAsFile();const r=new FileReader();r.onload=()=>{const rs=r.result;featuredData={name:f.name||"featured.png",mimeType:f.type||"image/png",base64:rs.slice(rs.indexOf(",")+1)};previewImg.src=rs;previewImg.style.display="block";showToast("已粘贴新的 Featured 图")};r.readAsDataURL(f);break}}});
submitBtnEl.onclick=async()=>{try{st("正在更新...",false,true);submitBtnEl.disabled=true;localStorage.setItem("publisher_api_base",base());localStorage.setItem("publisher_password",passwordInput.value);const data=collect();const r=await fetch(`${base()}/update`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({template:tpl,slug:sg,password:passwordInput.value,frontmatter:data,featured:featuredData})});const j=await r.json();if(!r.ok)throw new Error(j.error||"更新失败");st(`更新成功\n${j.markdownPath}`,false,true);}catch(err){st(err.message,true,true)}finally{submitBtnEl.disabled=false}};
(async()=>{if(!tpl||!sg)throw new Error("缺少 template/slug 参数");const [tr,ir]=await Promise.all([fetch("/publisher/templates.json",{cache:"no-store"}),fetch(`${base()}/content/item?template=${encodeURIComponent(tpl)}&slug=${encodeURIComponent(sg)}`,{cache:"no-store"})]);const tj=await tr.json();templates=tj.templates||[];const ij=await ir.json();if(!ir.ok)throw new Error(ij.error||"读取文章失败");renderForm({...ij.item.frontmatter,body:ij.item.body||""});showToast(`已打开文章：${sg}`);})().catch(err=>st(err.message,true,true));
</script>
</body>
</html>
