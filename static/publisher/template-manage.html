<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlackiePiggy CMS | 模板管理</title>
  <link rel="icon" type="image/svg+xml" href="/publisher/favicon.svg" />
  <style>
    :root{--bg:#eef2f7;--panel:#fff;--line:#d7dee7;--text:#15202b;--muted:#637282;--brand:#0f766e;--brand2:#1e9b86}
    *{box-sizing:border-box} body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .layout{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
    .side{position:sticky;top:0;height:100vh;overflow-y:auto;background:linear-gradient(160deg,#0d3e39,#0b2e32);color:#dff7f4;padding:20px}
    .brand{font-size:20px;font-weight:700;margin-bottom:20px}
    .nav a{display:block;color:#dff7f4;text-decoration:none;padding:10px 12px;border-radius:10px;margin-bottom:6px}
    .nav a.active,.nav a:hover{background:rgba(255,255,255,.14)}
    .main{padding:18px}
    .top,.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}
    .top{margin-bottom:14px}.top h1{margin:0 0 6px}.muted{color:var(--muted);font-size:13px}
    .panel{margin-bottom:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input,select,textarea,button{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:14px;background:#fff}
    textarea{min-height:460px;font-family:Consolas,Monaco,monospace}
    .btn{border:none;background:linear-gradient(120deg,var(--brand),var(--brand2));color:#fff;cursor:pointer}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row>*{width:auto}
    .status{white-space:pre-wrap;font-size:13px}
    .toast-stack{position:fixed;right:18px;top:18px;display:flex;flex-direction:column;gap:10px;z-index:9999;pointer-events:none}
    .toast{min-width:220px;max-width:360px;padding:12px 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--text);box-shadow:0 12px 30px rgba(21,32,43,.12);opacity:0;transform:translateY(8px);animation:toast-in .18s ease forwards}
    .toast.ok{border-color:#b7e4d7;background:#effaf5;color:#065f46}.toast.err{border-color:#efb6b6;background:#fff5f5;color:#b91c1c}
    .toast.fade-out{animation:toast-out .22s ease forwards}
    @keyframes toast-in{to{opacity:1;transform:translateY(0)}}
    @keyframes toast-out{to{opacity:0;transform:translateY(8px)}}
    @media (max-width:980px){.layout{grid-template-columns:1fr}.side{position:relative;height:auto}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="layout">
  <aside class="side">
    <div class="brand">Publisher CMS</div>
    <nav class="nav">
      <a href="/publisher/">总览</a>
      <a href="/publisher/create.html">新建发布</a>
      <a href="/publisher/manage.html">内容管理</a>
      <a href="/publisher/media-upload.html">Media Upload</a>
      <a href="/publisher/template-manage.html" class="active">模板管理</a>
    </nav>
  </aside>

  <main class="main">
    <section class="top">
      <h1>模板管理</h1>
      <div class="muted">直接管理 `archetypes/*.md`。保存后会自动更新 Publisher CMS 的模板识别结果。</div>
    </section>

    <section class="panel">
      <div class="grid">
        <div class="field"><label>API 地址</label><input id="apiBase" /></div>
        <div class="field"><label>密码</label><input id="password" type="password" /></div>
      </div>
      <div class="grid" style="margin-top:10px">
        <div class="field"><label>已有模板</label><select id="templateList"></select></div>
        <div class="field"><label>模板名（文件名）</label><input id="templateName" placeholder="例如 notes" /></div>
      </div>
      <div class="row" style="margin-top:10px">
        <button id="refreshBtn" type="button">刷新模板列表</button>
        <button id="loadBtn" type="button">加载模板</button>
        <button id="newBtn" type="button">新建空白模板</button>
        <button id="saveBtn" class="btn" type="button">保存模板</button>
      </div>
    </section>

    <section class="panel">
      <label style="display:block;font-size:12px;color:#637282;margin-bottom:6px">模板内容（完整 archetype Markdown）</label>
      <textarea id="templateContent"></textarea>
    </section>

    <section class="panel">
      <div id="status" class="status"></div>
    </section>
  </main>
</div>

<script>
const DRAFT_KEY="publisher_template_manage_draft_v1";
const local=["localhost","127.0.0.1"].includes(location.hostname);
const toastStackEl=document.body.appendChild(document.createElement("div"));
toastStackEl.className="toast-stack";
apiBase.value=localStorage.getItem("publisher_api_base")||(local?"http://127.0.0.1:8790":"");
password.value=localStorage.getItem("publisher_password")||(local?"123456":"");

const defaultTemplate=(name)=>`---\ntitle: ""\ndate: ${new Date().getFullYear()}-01-01T00:00:00+08:00\ndraft: true\nsummary: ""\n---\n\n<!--more-->\n\nWrite here.\n`;
function showToast(message,isError=false){if(!message)return;const toast=document.createElement("div");toast.className=`toast ${isError?"err":"ok"}`;toast.textContent=message;toastStackEl.appendChild(toast);setTimeout(()=>{toast.classList.add("fade-out");setTimeout(()=>toast.remove(),220);},1800);}
const st=(m,e=false,notify=false)=>{status.style.color=e?"#b91c1c":"#065f46";status.textContent=m||"";if(notify)showToast(String(m).split("\n")[0],e)};
const base=()=>apiBase.value.replace(/\/+$/,"");
const slugify=s=>String(s||"").toLowerCase().trim().replace(/[\s_]+/g,"-").replace(/[^a-z0-9-]/g,"").replace(/-+/g,"-").replace(/^-|-$/g,"");
const readDraft=()=>{try{return JSON.parse(sessionStorage.getItem(DRAFT_KEY)||"null")}catch{return null}};
const saveDraft=()=>{try{sessionStorage.setItem(DRAFT_KEY,JSON.stringify({apiBase:apiBase.value,password:password.value,templateList:templateList.value,templateName:templateName.value,templateContent:templateContent.value}))}catch{}};
function restoreDraft(){const d=readDraft();if(!d)return;apiBase.value=d.apiBase||apiBase.value;password.value=d.password||password.value;templateName.value=d.templateName||"";templateContent.value=d.templateContent||"";}

async function loadTemplateList(){
  const r=await fetch(`${base()}/template-files`);
  const j=await r.json();
  if(!r.ok) throw new Error(j.error||"读取模板列表失败");
  templateList.innerHTML="";
  (j.items||[]).forEach(name=>{const op=document.createElement("option");op.value=name;op.textContent=name;templateList.appendChild(op);});
  const d=readDraft();
  if(d?.templateList&&[...templateList.options].some(op=>op.value===d.templateList))templateList.value=d.templateList;
}

async function loadOne(name){
  const safe=slugify(name||templateList.value);
  if(!safe) throw new Error("请选择或填写模板名");
  const r=await fetch(`${base()}/template-file?name=${encodeURIComponent(safe)}`);
  const j=await r.json();
  if(!r.ok) throw new Error(j.error||"读取模板失败");
  templateName.value=j.item.name;
  templateContent.value=j.item.content;
  st(`已加载模板：${j.item.path}`);
}

async function saveTemplate(){
  const name=slugify(templateName.value);
  if(!name) throw new Error("模板名无效");
  const content=templateContent.value;
  if(!content.trim()) throw new Error("模板内容不能为空");
  localStorage.setItem("publisher_api_base",base());
  localStorage.setItem("publisher_password",password.value);
  const r=await fetch(`${base()}/template-file`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({password:password.value,name,content})
  });
  const j=await r.json();
  if(!r.ok) throw new Error(j.error||"保存失败");
  await loadTemplateList();
  templateList.value=name;
  saveDraft();
  st(`已保存模板：${j.item.path}\n发布页模板列表已自动更新。`);
}

refreshBtn.onclick=()=>{st("正在刷新模板列表...",false,true);loadTemplateList().then(()=>st("模板列表已刷新",false,true)).catch(e=>st(e.message,true,true));};
loadBtn.onclick=()=>{st("正在加载模板...",false,true);loadOne().then(()=>showToast("模板已加载")).catch(e=>st(e.message,true,true));};
newBtn.onclick=()=>{
  const name=slugify(templateName.value)||"new-template";
  templateName.value=name;
  templateContent.value=defaultTemplate(name);
  saveDraft();
  st("已创建空白模板草稿，可直接编辑后保存。",false,true);
};
saveBtn.onclick=()=>{st("正在保存模板...",false,true);saveTemplate().then(()=>showToast("模板已保存")).catch(e=>st(e.message,true,true));};
templateList.onchange=()=>{templateName.value=templateList.value;saveDraft();};
["input","change"].forEach(evt=>document.addEventListener(evt,(event)=>{if(["apiBase","password","templateList","templateName","templateContent"].includes(event.target.id))saveDraft();}));

(async()=>{
  await loadTemplateList();
  restoreDraft();
  if(templateList.value){
    templateName.value=templateName.value||templateList.value;
  }
})().catch(e=>st(e.message,true,true));
</script>
</body>
</html>
