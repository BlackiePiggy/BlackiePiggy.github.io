<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hugo 褫弝趙楷泃</title>
  <style>
    :root { --bg:#f6f7fb; --panel:#fff; --line:#d8dce6; --text:#1f2937; --muted:#6b7280; --primary:#14532d; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Microsoft YaHei",sans-serif; background:linear-gradient(135deg,#f3f4f6,#e8f4ea); color:var(--text); }
    .wrap { max-width:980px; margin:24px auto; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:20px; }
    h1 { margin:0 0 14px; font-size:24px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label { display:block; font-size:13px; font-weight:700; margin-bottom:4px; }
    input,select,textarea { width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:8px; font:inherit; }
    textarea { min-height:76px; resize:vertical; }
    .field { margin-bottom:10px; }
    .tag { font-size:12px; color:#fff; background:#b91c1c; border-radius:999px; padding:2px 8px; margin-left:8px; }
    .hint { font-size:12px; color:var(--muted); white-space:pre-wrap; }
    .row { margin:14px 0; }
    .drop {
      border:2px dashed #9ca3af; border-radius:10px; min-height:110px; display:flex; align-items:center; justify-content:center;
      color:#374151; background:#fcfcfd; text-align:center; padding:10px;
    }
    .drop img { max-height:140px; max-width:100%; border-radius:8px; }
    button { background:var(--primary); color:#fff; border:none; border-radius:8px; padding:10px 16px; cursor:pointer; font-weight:700; }
    .muted { color:var(--muted); font-size:13px; }
    .status { margin-top:12px; white-space:pre-wrap; }
    @media (max-width:780px){ .grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Hugo 褫弝趙楷泃</h1>
    <div class="grid">
      <div class="field">
        <label>囀⺍濬倰ㄗarchetypeㄘ</label>
        <select id="archetype"></select>
      </div>
      <div class="field">
        <label>醴梓 Sectionㄗ瞰⺼ projects / post / publicationsㄘ</label>
        <input id="section" placeholder="蘇＇躲 archetype 肮靡" />
      </div>
      <div class="field">
        <label>Slugㄗ醴翹靡ㄘ</label>
        <input id="slug" placeholder="祥沓寀赻雄蚕梓枙汜傖" />
      </div>
    </div>

    <div id="fields"></div>

    <div class="row">
      <label>淏恅ㄗMarkdownㄘ</label>
      <textarea id="body" style="min-height:180px;"></textarea>
    </div>

    <div class="row">
      <label>Feature 芞ㄗ褫梜泂 Ctrl+Vㄛ麼萸僻奻換ㄘ</label>
      <div id="drop" class="drop">萸僻森揭奻換ㄛ麼眻諉梜泂芞⑵</div>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" style="display:none" />
      <div class="muted" id="imgMeta"></div>
    </div>

    <button id="submit">楷票陔恅梒</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);
    const state = { archetypes: [], current: null, featured: null };

    async function loadArchetypes() {
      const res = await fetch('/api/archetypes');
      const data = await res.json();
      state.archetypes = data.archetypes || [];
      const sel = el('archetype');
      sel.innerHTML = state.archetypes.map(a => `<option value="${a.name}">${a.name}</option>`).join('');
      sel.onchange = () => renderFor(sel.value);
      renderFor(sel.value || state.archetypes[0]?.name);
    }

    function createInput(field) {
      const id = `f_${field.key}`;
      const required = field.required ? '<span class="tag">斛恁</span>' : '';
      const hint = field.hint ? `<div class="hint">${field.hint}</div>` : '';
      const val = field.defaultBlock || field.defaultInline || '';

      if (field.type === 'boolean') {
        const checked = String(val).trim() === 'true' ? 'checked' : '';
        return `<div class="field"><label>${field.key}${required}</label><input type="checkbox" id="${id}" ${checked}/>${hint}</div>`;
      }
      if (field.type === 'yaml' || field.type === 'list') {
        return `<div class="field"><label>${field.key}${required}</label><textarea id="${id}">${val}</textarea>${hint}</div>`;
      }
      const type = field.type === 'datetime' ? 'datetime-local' : 'text';
      const v = String(val).replace(/^['"]|['"]$/g,'');
      return `<div class="field"><label>${field.key}${required}</label><input type="${type}" id="${id}" value="${escapeHtml(v)}"/>${hint}</div>`;
    }

    function renderFor(name) {
      const a = state.archetypes.find(x => x.name === name);
      state.current = a;
      if (!a) return;
      el('section').value = a.suggestedSection || a.name;
      el('body').value = a.bodyTemplate || '';
      el('fields').innerHTML = a.fields.map(createInput).join('');
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setImage(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.featured = { filename: file.name, dataUrl: reader.result };
        el('drop').innerHTML = `<img src="${reader.result}" alt="featured" />`;
        el('imgMeta').textContent = `眒恁寁: ${file.name} (${Math.round(file.size/1024)} KB)`;
      };
      reader.readAsDataURL(file);
    }

    el('drop').addEventListener('click', () => el('fileInput').click());
    el('fileInput').addEventListener('change', (e) => setImage(e.target.files[0]));
    document.addEventListener('paste', (e) => {
      for (const item of (e.clipboardData?.items || [])) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          if (file) setImage(file);
          e.preventDefault();
          break;
        }
      }
    });

    el('submit').addEventListener('click', async () => {
      if (!state.current) return;
      const values = {};
      for (const f of state.current.fields) {
        const node = el(`f_${f.key}`);
        if (!node) continue;
        values[f.key] = f.type === 'boolean' ? String(node.checked) : node.value;
      }

      const payload = {
        archetype: state.current.name,
        section: el('section').value,
        slug: el('slug').value,
        body: el('body').value,
        values,
        featured: state.featured,
      };

      const status = el('status');
      status.textContent = '楷票笢...';
      const res = await fetch('/api/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();
      if (!res.ok) {
        status.textContent = `囮啖: ${data.error || 'unknown error'}`;
        return;
      }
      status.textContent = `傖髡斐膘: ${data.path}`;
    });

    loadArchetypes().catch(err => {
      el('status').textContent = `場宎趙囮啖: ${err.message}`;
    });
  </script>
</body>
</html>
